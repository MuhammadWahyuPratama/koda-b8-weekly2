<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style-1.css">
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
</head>
    <title>Browser Products</title>
</head>
<body>
    <header>
        <div class="topbar">
            <div class="container">
                <div class="address">
                    <img src="asset/SVG.svg" />
                    <span>Kirim ke: Jakarta Selatan</span>
                </div>
                <div class="roket">
                    <span>📞 0800-1234-5678 (Gratis)</span>
                    <span>🚀 Gratis ongkir di atas Rp 100.000</span>
                </div>
            </div>
        </div>
        <div class="searchBar">
            <div class="container">
                <div class="bar1">
                    <span>B</span>
                    <div class="bar1-1">BeliMudah</div>
                </div>
                <div class="bar2">
                    <input type="text" placeholder="Cari produk, merek,kategori...">
                    <span><img src="asset/Search.svg"/></span>
                </div>
                <div class="bar3">
                    <img src="asset/bel.svg" />
                    <img src="asset/people.svg" />
                    <span>Budi</span>
                    <img src="asset/love.svg"/>
                    <img src="asset/troli.svg"/>
                </div>
            </div>
        </div>

        <div class="navbar">
            <div class="container">
                <div class="nav"><img src="asset/titik3.svg" />
                    <span>Semua Kategori</span>
                    <img src="asset/V.svg" />
                </div>
                <div class="grey">
                <span >💻 Elektronik</span>
                <span>👗 Fashion</span>
                <span>🏠 Rumah & Dapur</span>
                <span>💄 Kecantikan</span>
                <span>⚽ Olahraga</span>
                <span>📚 Buku & Alat Tulis</span>
                </div>
                <span class="api">🔥 Promo</span>
            </div>
        </div>

    </header>
</body>
</html>
